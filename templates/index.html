<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heart Disease Predictor</title>

<style>

/* ===== Google Font ===== */
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

/* ===== Body Background ===== */
body{
    background: linear-gradient(135deg,#1e3c72,#2a5298);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

/* ===== Card Container ===== */
.container{
    background:#ffffff;
    width:100%;
    max-width:950px;
    border-radius:15px;
    padding:35px;
    box-shadow:0 20px 50px rgba(0,0,0,0.2);
}

/* ===== Heading ===== */
.container h2{
    text-align:center;
    margin-bottom:30px;
    color:#1e3c72;
    font-weight:600;
}

/* ===== Form Grid Layout ===== */
form{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

/* ===== Input Group ===== */
.input-group{
    display:flex;
    flex-direction:column;
}

label{
    font-size:14px;
    margin-bottom:6px;
    color:#444;
    font-weight:500;
}

input{
    padding:10px 12px;
    border-radius:8px;
    border:1px solid #ddd;
    font-size:14px;
    transition:0.3s;
}

input:focus{
    border-color:#2a5298;
    box-shadow:0 0 8px rgba(42,82,152,0.2);
    outline:none;
}

/* ===== Button ===== */
button{
    grid-column:1/-1;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#1e3c72;
    color:#fff;
    font-size:16px;
    font-weight:500;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#16325c;
    transform:translateY(-2px);
}

/* ===== Result Box ===== */
.result{
    margin-top:25px;
    padding:15px;
    text-align:center;
    font-size:18px;
    font-weight:600;
    border-radius:8px;
}

.result.positive{
    background:#ffe5e5;
    color:#d63031;
}

.result.negative{
    background:#e6f9ed;
    color:#00b894;
}

.result.warning{
    background:#fff4e5;
    color:#e17055;
}

/* ===== Mobile Optimization ===== */
@media(max-width:600px){
    .container{
        padding:25px;
    }
    form{
        grid-template-columns:1fr;
    }
}

</style>
</head>

<body>

<div class="container">
    <h2>Heart Disease Predictor</h2>

    <form action="/predict" method="post">

        <div class="input-group">
            <label>Age (29-77)</label>
            <input type="number" name="age" required>
        </div>

        <div class="input-group">
            <label>Sex (1=Male, 0=Female)</label>
            <input type="number" name="sex" required>
        </div>

        <div class="input-group">
            <label>Chest Pain Type (0-3)</label>
            <input type="number" name="cp" required>
        </div>

        <div class="input-group">
            <label>Resting Blood Pressure (94-200)</label>
            <input type="number" name="trestbps" required>
        </div>

        <div class="input-group">
            <label>Cholesterol (126-564)</label>
            <input type="number" name="chol" required>
        </div>

        <div class="input-group">
            <label>Fasting Blood Sugar (>120 mg/dl, 1=Yes, 0=No)</label>
            <input type="number" name="fbs" required>
        </div>

        <div class="input-group">
            <label>Resting ECG (0-2)</label>
            <input type="number" name="restecg" required>
        </div>

        <div class="input-group">
            <label>Maximum Heart Rate (71-202)</label>
            <input type="number" name="thalach" required>
        </div>

        <div class="input-group">
            <label>Exercise Induced Angina (1=Yes, 0=No)</label>
            <input type="number" name="exang" required>
        </div>

        <div class="input-group">
            <label>ST Depression (0-6)</label>
            <input type="number" step="any" name="oldpeak" required>
        </div>

        <div class="input-group">
            <label>Slope (0-2)</label>
            <input type="number" name="slope" required>
        </div>

        <div class="input-group">
            <label>Major Vessels (0-3)</label>
            <input type="number" name="ca" required>
        </div>

        <div class="input-group">
            <label>Thal (1-3)</label>
            <input type="number" name="thal" required>
        </div>

        <button type="submit">Predict Result</button>

    </form>

    {% if result %}
        {% if result == "Heart Disease Likely ⚠️" %}
            <div class="result positive">{{ result }}</div>
        {% elif result == "No Heart Disease ✅" %}
            <div class="result negative">{{ result }}</div>
        {% else %}
            <div class="result warning">{{ result }}</div>
        {% endif %}
    {% endif %}

</div>

</body>
</html>
